{% extends 'base.html' %}
{% block content %}
<h1>Pergunta 5</h1>

Qual o nome e ano de inscrição dos sites do país com o maior número de sites? Ordenado pelo ano de inscrição e nome do Site.

<table>
  <tr>
    <th><b>Site Name</b></th>
    <th><b>Year</b></th>
  </tr>
  {% for r in result %}
  <tr>
    <td>{{ r.SiteName|safe }}</td>
    <td>{{ r.Year }}</td>
  </tr>
  {% endfor %}
</table>

{% endblock %}
